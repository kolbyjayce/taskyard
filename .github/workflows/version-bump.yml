name: Version Bump

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major
      prerelease:
        description: 'Create pre-release'
        required: false
        type: boolean
        default: false

jobs:
  version-bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Configure git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Bump version
      id: version
      run: |
        if [ "${{ github.event.inputs.prerelease }}" == "true" ]; then
          NEW_VERSION=$(npm version pre${{ github.event.inputs.version_type }} --preid=rc --no-git-tag-version --workspaces)
          NEW_VERSION=$(npm version pre${{ github.event.inputs.version_type }} --preid=rc --no-git-tag-version)
        else
          NEW_VERSION=$(npm version ${{ github.event.inputs.version_type }} --no-git-tag-version --workspaces)
          NEW_VERSION=$(npm version ${{ github.event.inputs.version_type }} --no-git-tag-version)
        fi
        echo "VERSION=${NEW_VERSION}" >> $GITHUB_OUTPUT
        echo "New version: ${NEW_VERSION}"

    - name: Build packages
      run: npm run build

    - name: Commit version bump
      run: |
        git add .
        git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }}"

    - name: Create and push tag
      run: |
        git tag ${{ steps.version.outputs.VERSION }}
        git push origin main
        git push origin ${{ steps.version.outputs.VERSION }}

    - name: Create release notes
      run: |
        echo "## Release ${{ steps.version.outputs.VERSION }}" > release-notes.md
        echo "" >> release-notes.md
        echo "### Changes" >> release-notes.md
        git log --oneline $(git describe --tags --abbrev=0 HEAD^)..HEAD >> release-notes.md || echo "- Initial release" >> release-notes.md

    - name: Upload release notes
      uses: actions/upload-artifact@v3
      with:
        name: release-notes
        path: release-notes.md