name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Build packages
      run: npm run build

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Update package versions
      run: |
        npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version --workspaces
        npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version

        # Synchronize CLI dependency to match MCP server version
        cd packages/cli
        node -e "
          const pkg = require('./package.json');
          pkg.dependencies['@taskyard/mcp-server'] = '${{ steps.version.outputs.VERSION }}';
          require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
        "
        cd ../..

    - name: Publish CLI package to npm
      run: |
        cd packages/cli
        npm publish --provenance
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Publish MCP Server package to npm
      run: |
        cd packages/mcp-server
        npm publish --provenance
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ steps.version.outputs.VERSION }}
        draft: false
        prerelease: false
        body: |
          ## Changes in ${{ steps.version.outputs.VERSION }}

          ### CLI Package (`taskyard`)
          - Install: `npx taskyard@${{ steps.version.outputs.VERSION }}`

          ### MCP Server Package (`@taskyard/mcp-server`)
          - Install: `npm install @taskyard/mcp-server@${{ steps.version.outputs.VERSION }}`

          ### Dashboard
          - Included in MCP server distribution

          See [CHANGELOG.md](./CHANGELOG.md) for detailed changes.