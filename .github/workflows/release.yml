name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Build packages
      run: npm run build

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Sync package versions
      run: |
        node scripts/sync-versions.js ${{ steps.version.outputs.VERSION }}

    - name: Phase 1 - Publish MCP Server
      run: |
        cd packages/mcp-server
        npm publish --provenance
        echo "✅ Published @taskyard/mcp-server@${{ steps.version.outputs.VERSION }}"
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Wait for npm registry propagation
      run: sleep 10

    - name: Phase 2 - Update CLI dependency and publish
      run: |
        cd packages/cli

        # Install the exact version we just published
        npm install @taskyard/mcp-server@${{ steps.version.outputs.VERSION }} --save --save-exact

        # Verify dependency was updated correctly
        INSTALLED_VERSION=$(node -p "require('./package.json').dependencies['@taskyard/mcp-server']")
        if [[ "$INSTALLED_VERSION" != "${{ steps.version.outputs.VERSION }}" ]]; then
          echo "❌ Error: Failed to install correct MCP server version"
          echo "Expected: ${{ steps.version.outputs.VERSION }}, Got: $INSTALLED_VERSION"
          exit 1
        fi

        echo "✅ CLI now depends on @taskyard/mcp-server@$INSTALLED_VERSION"

        # Rebuild CLI with published dependency
        npm run build

        # Publish CLI
        npm publish --provenance
        echo "✅ Published taskyard@${{ steps.version.outputs.VERSION }}"
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ steps.version.outputs.VERSION }}
        draft: false
        prerelease: false
        body: |
          ## Changes in ${{ steps.version.outputs.VERSION }}

          ### CLI Package (`taskyard`)
          - Install: `npx taskyard@${{ steps.version.outputs.VERSION }}`

          ### MCP Server Package (`@taskyard/mcp-server`)
          - Install: `npm install @taskyard/mcp-server@${{ steps.version.outputs.VERSION }}`

          ### Dashboard
          - Included in MCP server distribution

          See [CHANGELOG.md](./CHANGELOG.md) for detailed changes.