name: Publish Beta

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      beta_tag:
        description: 'Beta tag (e.g., beta.1, rc.1)'
        required: true
        default: 'beta'

jobs:
  publish-beta:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Build packages
      run: npm run build

    - name: Generate beta version
      id: version
      run: |
        CURRENT_VERSION=$(node -p "require('./package.json').version")
        TIMESTAMP=$(date +%Y%m%d%H%M%S)
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          BETA_VERSION="${CURRENT_VERSION}-${{ github.event.inputs.beta_tag }}.${TIMESTAMP}"
        else
          BETA_VERSION="${CURRENT_VERSION}-beta.${TIMESTAMP}"
        fi
        echo "BETA_VERSION=${BETA_VERSION}" >> $GITHUB_OUTPUT
        echo "Publishing beta version: ${BETA_VERSION}"

    - name: Sync package versions for beta
      run: |
        node scripts/sync-versions.js ${{ steps.version.outputs.BETA_VERSION }}

    - name: Phase 1 - Publish MCP Server (beta)
      run: |
        cd packages/mcp-server
        npm publish --tag beta --provenance
        echo "✅ Published @taskyard/mcp-server@${{ steps.version.outputs.BETA_VERSION }} (beta)"
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Wait for npm registry propagation
      run: sleep 10

    - name: Phase 2 - Update CLI dependency and publish (beta)
      run: |
        cd packages/cli

        # Install the exact beta version we just published
        npm install @taskyard/mcp-server@${{ steps.version.outputs.BETA_VERSION }} --save --save-exact

        # Verify dependency was updated correctly
        INSTALLED_VERSION=$(node -p "require('./package.json').dependencies['@taskyard/mcp-server']")
        if [[ "$INSTALLED_VERSION" != "${{ steps.version.outputs.BETA_VERSION }}" ]]; then
          echo "❌ Error: Failed to install correct MCP server version"
          echo "Expected: ${{ steps.version.outputs.BETA_VERSION }}, Got: $INSTALLED_VERSION"
          exit 1
        fi

        echo "✅ CLI now depends on @taskyard/mcp-server@$INSTALLED_VERSION"

        # Rebuild CLI with published dependency
        npm run build

        # Publish CLI
        npm publish --tag beta --provenance
        echo "✅ Published taskyard@${{ steps.version.outputs.BETA_VERSION }} (beta)"
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Create beta release summary
      run: |
        echo "## Beta Release Published 🚀" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Version:** ${{ steps.version.outputs.BETA_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Install Commands:" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "# CLI" >> $GITHUB_STEP_SUMMARY
        echo "npx taskyard@${{ steps.version.outputs.BETA_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "# MCP Server" >> $GITHUB_STEP_SUMMARY
        echo "npm install @taskyard/mcp-server@${{ steps.version.outputs.BETA_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY