name: NPM Trusted Publishing

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major
        - prerelease
      prerelease_tag:
        description: 'Prerelease tag (beta, rc, alpha)'
        required: false
        default: 'beta'
        type: string
      dry_run:
        description: 'Dry run - validate without publishing'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '20.x'
  REGISTRY_URL: 'https://registry.npmjs.org'

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        registry-url: ${{ env.REGISTRY_URL }}

    - name: Update npm to latest version
      run: |
        echo "Current npm version: $(npm --version)"
        npm install -g npm@latest
        echo "Updated npm version: $(npm --version)"
        echo "Node version: $(node --version)"
        # Clear any problematic npm config
        npm config delete always-auth 2>/dev/null || true

    - name: Install dependencies
      run: |
        npm install
        # Ensure all workspace dependencies are installed
        npm install --workspaces

    - name: Determine version
      id: version
      run: |
        if [[ "${{ github.event_name }}" == "push" ]]; then
          # Tag-based release
          VERSION=${GITHUB_REF#refs/tags/v}
          IS_PRERELEASE=false
          if [[ "$VERSION" == *"-"* ]]; then
            IS_PRERELEASE=true
          fi
        else
          # Manual workflow dispatch
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          if [[ "${{ github.event.inputs.release_type }}" == "prerelease" ]]; then
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            VERSION="${CURRENT_VERSION}-${{ github.event.inputs.prerelease_tag }}.${TIMESTAMP}"
            IS_PRERELEASE=true
          else
            # For patch/minor/major, we'll use npm version to calculate
            npm version ${{ github.event.inputs.release_type }} --no-git-tag-version
            VERSION=$(node -p "require('./package.json').version")
            IS_PRERELEASE=false
          fi
        fi

        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "is_prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT
        echo "🏷️ Target version: ${VERSION}"
        echo "🔖 Is prerelease: ${IS_PRERELEASE}"

    - name: Sync package versions
      run: |
        node scripts/sync-versions.js ${{ steps.version.outputs.version }}

    - name: Run quality checks
      run: |
        npm run lint
        npm run typecheck
        npm test

    - name: Build packages
      run: npm run build

    - name: Validate publish readiness
      run: node scripts/check-publish-ready.js

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          packages/cli/dist/**/*
          packages/cli/dashboard/**/*
          packages/cli/package.json
        retention-days: 1

  publish-packages:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ !inputs.dry_run }}
    permissions:
      contents: write
      id-token: write  # Required for npm trusted publishing
      packages: write
    environment: npm-publishing
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Node.js with npm provenance
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        registry-url: ${{ env.REGISTRY_URL }}

    - name: Update npm to latest version
      run: |
        echo "Current npm version: $(npm --version)"
        npm install -g npm@latest
        echo "Updated npm version: $(npm --version)"
        echo "Node version: $(node --version)"
        # Clear any problematic npm config
        npm config delete always-auth 2>/dev/null || true

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: .

    - name: Install dependencies
      run: |
        npm install
        # Ensure all workspace dependencies are installed
        npm install --workspaces

    - name: Set package versions
      run: |
        node scripts/sync-versions.js ${{ needs.validate.outputs.version }}

    - name: Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

    - name: Build and publish consolidated CLI package
      run: |
        # Clean and rebuild the consolidated package (includes dashboard)
        # This ensures proper build context after artifact download
        npm run build

        cd packages/cli

        # Verify build artifacts are present
        echo "📦 Verifying build artifacts:"
        ls -la dist/ || echo "⚠️ dist/ directory not found"
        ls -la dashboard/ || echo "⚠️ dashboard/ directory not found"

        # Publish the consolidated CLI package
        PUBLISH_CMD="npm publish --provenance"
        if [[ "${{ needs.validate.outputs.is_prerelease }}" == "true" ]]; then
          PUBLISH_CMD="${PUBLISH_CMD} --tag ${{ github.event.inputs.prerelease_tag || 'beta' }}"
        fi

        echo "🚀 Publishing taskyard@${{ needs.validate.outputs.version }}"
        eval $PUBLISH_CMD
        echo "✅ Published taskyard@${{ needs.validate.outputs.version }}"

    - name: Commit version changes
      if: ${{ github.event_name == 'workflow_dispatch' }}
      run: |
        git add .
        git commit -m "chore: release v${{ needs.validate.outputs.version }}

        🤖 Generated with [Claude Code](https://claude.ai/code)

        Co-Authored-By: Claude <noreply@anthropic.com>"

        if [[ "${{ needs.validate.outputs.is_prerelease }}" == "false" ]]; then
          git tag "v${{ needs.validate.outputs.version }}"
        fi

    - name: Push changes
      if: ${{ github.event_name == 'workflow_dispatch' }}
      run: |
        git push origin ${{ github.ref_name }}
        if [[ "${{ needs.validate.outputs.is_prerelease }}" == "false" ]]; then
          git push origin "v${{ needs.validate.outputs.version }}"
        fi

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, publish-packages]
    if: ${{ !inputs.dry_run }}
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate changelog
      id: changelog
      run: |
        if git describe --tags --abbrev=0 HEAD^ >/dev/null 2>&1; then
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^)
          CHANGELOG=$(git log --oneline ${LAST_TAG}..HEAD)
        else
          CHANGELOG="Initial release"
        fi

        # Format for GitHub Release
        {
          echo "## 📦 Published Package"
          echo ""
          echo "### CLI Package (\`taskyard\`)"
          echo "- **Install:** \`npx taskyard@${{ needs.validate.outputs.version }}\`"
          echo "- **NPM:** [taskyard@${{ needs.validate.outputs.version }}](https://www.npmjs.com/package/taskyard/v/${{ needs.validate.outputs.version }})"
          echo ""
          echo "This consolidated package includes:"
          echo "- CLI tool for project management"
          echo "- MCP server functionality"
          echo "- Integrated dashboard interface"
          echo ""
          echo "## 📝 Changes"
          echo ""
          echo "\`\`\`"
          echo "$CHANGELOG"
          echo "\`\`\`"
          echo ""
          echo "---"
          echo "*Published with provenance using GitHub's trusted publishing 🔒*"
        } > changelog.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ needs.validate.outputs.version }}
        name: Release v${{ needs.validate.outputs.version }}
        body_path: changelog.md
        prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' }}
        make_latest: ${{ needs.validate.outputs.is_prerelease == 'false' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [validate, publish-packages, create-release]
    if: always() && (needs.publish-packages.result == 'success' || inputs.dry_run)
    steps:
    - name: Success summary
      run: |
        echo "## 🎉 NPM Publishing Completed Successfully!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Version:** \`${{ needs.validate.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Prerelease:** ${{ needs.validate.outputs.is_prerelease }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [[ "${{ inputs.dry_run }}" == "true" ]]; then
          echo "### 🔍 Dry Run Results" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Version validation passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Quality checks passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build artifacts generated" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Publish readiness verified" >> $GITHUB_STEP_SUMMARY
        else
          echo "### 📦 Published Package" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ \`taskyard@${{ needs.validate.outputs.version }}\` (consolidated package)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Installation Commands" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# CLI tool with integrated MCP server and dashboard" >> $GITHUB_STEP_SUMMARY
          echo "npx taskyard@${{ needs.validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        fi